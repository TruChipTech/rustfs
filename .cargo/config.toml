# Cross-compilation linker configuration for RustFS.
# The C dependency (bzip2) is built with the `cc` crate, which auto-detects the
# matching cross GCC from the target triple (e.g. aarch64-linux-gnu-gcc).

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
